services:
  api-producer:
    build: ./services/API-producer
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka-1:9093,kafka-2:9095,kafka-3:9097
      TOPIC_EVENTS: weather.telemetry
      KAFKA_SECURITY_PROTOCOL: SSL
      KAFKA_SSL_CA_LOCATION: /app/security/ca.crt
      KAFKA_SSL_CERTIFICATE_LOCATION: /app/security/client-creds/kafka.client.certificate.pem
      KAFKA_SSL_KEY_LOCATION: /app/security/client-creds/kafka.client.key
    volumes:
      - ./security:/app/security:ro,z
    networks:
      - weather-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - weather-net

  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9093 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9093,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.kafka-1.truststore.pkcs12
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.kafka-1.keystore.pkcs12
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - ./security/kafka-1-creds:/etc/kafka/secrets
    networks:
      - weather-net

  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9095 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9095,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9095,EXTERNAL://127.0.0.1:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.kafka-2.truststore.pkcs12
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.kafka-2.keystore.pkcs12
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - ./security/kafka-2-creds:/etc/kafka/secrets
    networks:
      - weather-net

  kafka-3:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9096:9096"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9097 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9097,EXTERNAL://0.0.0.0:9096
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:9097,EXTERNAL://127.0.0.1:9096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SSL,EXTERNAL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.kafka-3.truststore.pkcs12
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.kafka-3.keystore.pkcs12
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - ./security/kafka-3-creds:/etc/kafka/secrets
    networks:
      - weather-net

  dashboard:
    build: ./services/dashboard
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8500/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      api-producer:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka-1:9093,kafka-2:9095,kafka-3:9097
      TOPIC_NOTIFICATIONS: weather.telemetry
      API_BASE: http://api-producer:8000
      
      KAFKA_SECURITY_PROTOCOL: SSL
      KAFKA_SSL_CA_LOCATION: /app/security/ca.crt
      KAFKA_SSL_CERTIFICATE_LOCATION: /app/security/client-creds/kafka.client.certificate.pem
      KAFKA_SSL_KEY_LOCATION: /app/security/client-creds/kafka.client.key
    volumes:
      - ./security:/app/security:ro,z
    networks:
      - weather-net

  notifier:
    restart: on-failure
    build: ./services/notifier
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka-1:9093,kafka-2:9095,kafka-3:9097
      TOPIC_TELEMETRY: weather.telemetry
      TOPIC_NOTIFICATIONS: weather.alerts
      GROUP_ID: notifier-group
      KAFKA_SECURITY_PROTOCOL: SSL
      KAFKA_SSL_CA_LOCATION: /app/security/ca.crt
      KAFKA_SSL_CERTIFICATE_LOCATION: /app/security/client-creds/kafka.client.certificate.pem
      KAFKA_SSL_KEY_LOCATION: /app/security/client-creds/kafka.client.key
    volumes:
      - ./security:/app/security:ro,z
    networks:
      - weather-net

  mongodb:
    image: mongo:6.0
    container_name: weather-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - weather-net

  storage:
    restart: on-failure
    build: ./services/storage
    container_name: weather-storage
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka-1:9093,kafka-2:9095,kafka-3:9097
      TOPIC_TELEMETRY: weather.telemetry
      GROUP_ID: storage-group
      MONGO_URI: mongodb://mongodb:27017/
      
      KAFKA_SECURITY_PROTOCOL: SSL
      KAFKA_SSL_CA_LOCATION: /app/security/ca.crt
      KAFKA_SSL_CERTIFICATE_LOCATION: /app/security/client-creds/kafka.client.certificate.pem
      KAFKA_SSL_KEY_LOCATION: /app/security/client-creds/kafka.client.key
    volumes:
      - ./security:/app/security:ro,z
    networks:
      - weather-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: weather-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9093,kafka-2:9095,kafka-3:9097
      
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SSL
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/security/kafka-1-creds/kafka.kafka-1.truststore.pkcs12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/security/kafka-1-creds/kafka.kafka-1.keystore.pkcs12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_PASSWORD}
    volumes:
      - ./security:/app/security:ro,z
    networks:
      - weather-net

  telegram-forwarder:
      restart: on-failure
      build: ./services/telegram-forwarder
      container_name: weather-telegram-forwarder
      depends_on:
        kafka-1:
          condition: service_healthy
        kafka-2:
          condition: service_healthy
        kafka-3:
          condition: service_healthy
      environment:
        KAFKA_BOOTSTRAP: kafka-1:9093,kafka-2:9095,kafka-3:9097
        TOPIC_ALERTS: weather.alerts
        GROUP_ID: telegram-forwarder-group
        TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
        TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        
        KAFKA_SECURITY_PROTOCOL: SSL
        KAFKA_SSL_CA_LOCATION: /app/security/ca.crt
        KAFKA_SSL_CERTIFICATE_LOCATION: /app/security/client-creds/kafka.client.certificate.pem
        KAFKA_SSL_KEY_LOCATION: /app/security/client-creds/kafka.client.key
      volumes:
        - ./security:/app/security:ro,z
      networks:
        - weather-net

networks:
  weather-net:
    driver: bridge

volumes:
  mongodb_data: